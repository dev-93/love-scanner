name: Daily Marketing Briefing

on:
  schedule:
    # 10:30 AM KST ~ 09:30 PM KST (Every hour at :30)
    # UTC 01:30 ~ 12:30
    - cron: '30 1-12 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  marketing-report:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Send Marketer Report
        run: |
          # 최근 커밋 로그 추출 (줄바꿈을 \n 으로 변환)
          COMMITS=$(git log -n 5 --pretty=format:"- %s (%ad)" --date=short | tr '\n' ' ')
          
          # jq로 안전하게 JSON 생성 (특수문자/따옴표 자동 이스케이프)
          JSON_BODY=$(jq -n --arg changes "$COMMITS" '{"recentChanges": $changes}')

          # API 호출
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${{ secrets.VERCEL_MARKETER_URL }}/api/marketer" \
            -H "Content-Type: application/json" \
            -H "x-marketer-token: ${{ secrets.MARKETER_API_TOKEN }}" \
            -d "$JSON_BODY")

          # 결과 출력 (디버깅용)
          echo "Response: $RESPONSE"
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          echo "HTTP Status: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ API 호출 실패 (Status: $HTTP_STATUS)"
            exit 1
          fi
          
          echo "✅ 마케터 보고 성공!"
