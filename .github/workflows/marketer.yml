name: Daily Marketing Briefing

on:
  schedule:
    # 10:30 AM KST ~ 09:30 PM KST (Every hour at :30)
    # UTC 01:30 ~ 12:30
    - cron: '30 1-12 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  marketing-report:
    runs-on: ubuntu-latest
    environment: Production # GitHub Environments의 Secret에 접근하기 위해 설정
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Get Recent Commits
        id: get_commits
        run: |
          # 커밋 로그를 한 줄로 합쳐서 환경 변수에 저장
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          git log -n 5 --pretty=format:"- %s (%ad)" --date=short >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Call Marketer API
        run: |
          curl -X POST "https://love-scanner.vercel.app/api/marketer" \
            -H "Content-Type: application/json" \
            -H "x-marketer-token: ${{ secrets.MARKETER_API_TOKEN }}" \
            -d "{ \"recentChanges\": \"${{ env.COMMITS }}\" }"
