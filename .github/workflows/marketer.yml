name: Daily Marketing Briefing

on:
  schedule:
    # 10:30 AM KST ~ 09:30 PM KST (매시간 30분)
    # UTC 01:30 ~ 12:30
    - cron: '30 1-12 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  marketing-report:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Send Marketer Report
        run: |
          # 1. 최근 커밋 로그 추출 (안전하게 한 줄로 합침)
          COMMITS=$(git log -n 5 --pretty=format:"- %s (%ad)" --date=short | tr '\n' ' ')
          
          # 2. jq로 JSON 이스케이프 (따옴표 등 오류 방지)
          JSON_BODY=$(jq -n --arg changes "$COMMITS" '{"recentChanges": $changes}')

          # 3. Vercel API 호출 (보안 토큰 포함)
          echo "🚀 Vercel 마케터 비서를 호출합니다..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${{ secrets.VERCEL_MARKETER_URL }}/api/marketer" \
            -H "Content-Type: application/json" \
            -H "x-marketer-token: ${{ secrets.MARKETER_API_TOKEN }}" \
            -d "$JSON_BODY")

          # 4. 결과 분석 및 디버깅
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1 | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response Body: $BODY"
          echo "HTTP Status: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ 에러: Vercel 서버에서 오류가 발생했습니다. (Status: $HTTP_STATUS)"
            exit 1
          fi
          
          echo "✅ 마케터 제시의 보고가 전송되었습니다!"
